<script>
  (() => {
    const tabButtons = Array.from(document.querySelectorAll(".feed-tab-btn"));
    const feedCards = Array.from(document.querySelectorAll(".feed-card"));

    function setFeed(activeFeed) {
      tabButtons.forEach((button) => {
        const isActive = button.dataset.feedTarget === activeFeed;
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
        button.classList.toggle("bg-gradient-to-r", isActive);
        button.classList.toggle("from-[#FF4D6D]", isActive);
        button.classList.toggle("to-[#FF8A5B]", isActive);
        button.classList.toggle("text-white", isActive);
        button.classList.toggle("text-on-surface-variant", !isActive);
      });

      feedCards.forEach((card) => {
        card.classList.toggle("hidden", card.dataset.feed !== activeFeed);
      });
    }

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => setFeed(button.dataset.feedTarget));
    });

    setFeed("style");
  })();
</script>
