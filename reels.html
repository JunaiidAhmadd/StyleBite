<script>
  (() => {
    const typeButtons = Array.from(document.querySelectorAll(".reel-type-btn"));
    const reelBackground = document.getElementById("reelBackground");
    const reelHandle = document.getElementById("reelHandle");
    const reelLocation = document.getElementById("reelLocation");
    const reelCaption = document.getElementById("reelCaption");
    const reelTags = document.getElementById("reelTags");
    const reelRating = document.getElementById("reelRating");
    const reelLikes = document.getElementById("reelLikes");
    const reelComments = document.getElementById("reelComments");
    const cityLabel = document.getElementById("cityLabel");
    const cityBackdrop = document.getElementById("cityBackdrop");
    const citySheet = document.getElementById("citySheet");
    const openCityPicker = document.getElementById("openCityPicker");
    const closeCityPicker = document.getElementById("closeCityPicker");
    const citySearchInput = document.getElementById("citySearchInput");
    const suggestedCities = document.getElementById("suggestedCities");
    const cityOptionsList = document.getElementById("cityOptionsList");
    const cityNoResults = document.getElementById("cityNoResults");

    const reelData = {
      style: {
        handle: "@alex.style",
        caption: "Casual streetwear look for summer.",
        tags: ["#OOTD", "#Streetwear", "#StyleBite"],
        rating: "4.5",
        likes: "12.4k",
        comments: "842",
        image: "https://lh3.googleusercontent.com/aida-public/AB6AXuCmrfH0tyoAk5KScnI-oAzB2anNN_ozAeFJzWZsFyTxcJE_lhYgHvnmXbuYD1xKI9XoWI3K8bt2H_yQTClSRDSYgJwfiWrQy2vbiWGv8HNWuFCjIlDb8eD0BFJ0fwwmlk8iKt7Mfn9ZY0kja4rn8x7iEbK6cNVw8XJAB54WIdY13kYLGQdjBZnRZzfvtTxQhXnC2eBBG8sqYynQ_Y9xSvxYpPwhyAJ0YO0G06o_MTtJslSX5K73cSb2Cfk-WOA-6vbdRCTkq56g_jg",
        imageAlt: "Style reel fashion look"
      },
      bite: {
        handle: "@bite_lab",
        caption: "Loaded peri platter review with crispy wings and smoky fries.",
        tags: ["#FoodReel", "#CityBites", "#TasteTest"],
        rating: "4.8",
        likes: "9.1k",
        comments: "611",
        image: "https://lh3.googleusercontent.com/aida-public/AB6AXuDVZBMLtjp7r_u_ei0nItv7U1rkFKMB0aLnr7k66zTcoYdiThQNDSNWTptr6KXJNOgXwfXvU7G1XpggyyFIDd9Jj_UvFKTTsKlcsm_bZRgsNdsRIc5J0wUahgDoJ8aUHHqjftRlh0Nkt2CIlf9JJajnACHGwPyMgtPcwxmi4zOHurOG3eaAjvxHY7PBxDkoi3aByMBfOEHUGoUptsVZj0xOmS4frNZkdItePEntLd1ksktdSQo-99ehBk3IlUdF2GgOTrHRkMP_L8w",
        imageAlt: "Food reel plated dish"
      }
    };

    const CITY_KEY = "stylebite_selected_city";
    let activeFeed = "style";
    let selectedCity = localStorage.getItem(CITY_KEY) || "Karachi";
    const allCities = [
      "Karachi",
      "Lahore",
      "Islamabad",
      "Rawalpindi",
      "Peshawar",
      "Quetta",
      "New York",
      "Tokyo",
      "Dubai",
      "London",
      "Istanbul",
      "Bangkok",
      "Doha",
      "Riyadh",
      "Toronto",
      "Sydney"
    ];
    const suggestedByFeed = {
      style: ["Karachi", "Tokyo", "New York", "London", "Dubai"],
      bite: ["Karachi", "Lahore", "Istanbul", "Bangkok", "Dubai"]
    };

    function setTypeButtonState(feed) {
      typeButtons.forEach((button) => {
        const isActive = button.dataset.feed === feed;
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
        button.classList.toggle("bg-gradient-to-r", isActive);
        button.classList.toggle("from-[#FF4D6D]", isActive);
        button.classList.toggle("to-[#FF8A5B]", isActive);
        button.classList.toggle("text-white", isActive);
        button.classList.toggle("text-white/70", !isActive);
      });
    }

    function renderTags(tags) {
      reelTags.innerHTML = "";
      tags.forEach((tag) => {
        const tagNode = document.createElement("span");
        tagNode.className = "px-3 py-1 bg-white/10 backdrop-blur-md rounded-full text-[11px] font-medium tracking-wide text-white";
        tagNode.textContent = tag;
        reelTags.appendChild(tagNode);
      });
    }

    function renderFeed(feed) {
      const data = reelData[feed];
      reelBackground.src = data.image;
      reelBackground.alt = data.imageAlt;
      reelHandle.textContent = data.handle;
      reelLocation.textContent = selectedCity;
      reelCaption.textContent = data.caption;
      reelRating.textContent = data.rating;
      reelLikes.textContent = data.likes;
      reelComments.textContent = data.comments;
      cityLabel.textContent = selectedCity;
      renderTags(data.tags);
      setTypeButtonState(feed);
    }

    function normalizeCity(value) {
      return value.trim().toLowerCase();
    }

    function selectCity(city) {
      selectedCity = city;
      localStorage.setItem(CITY_KEY, selectedCity);
      renderFeed(activeFeed);
      renderSuggestedCities();
      renderCityOptions(citySearchInput.value || "");
      closeCitySheet();
    }

    function renderSuggestedCities() {
      const suggestions = suggestedByFeed[activeFeed] || [];
      suggestedCities.innerHTML = "";
      suggestions.forEach((city) => {
        const isSelected = city === selectedCity;
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "rounded-full px-4 py-2 text-xs font-semibold whitespace-nowrap transition-all active:scale-95";
        if (isSelected) {
          chip.className += " bg-gradient-to-r from-[#FF4D6D] to-[#FF8A5B] text-white shadow-[0_8px_18px_-12px_rgba(255,77,109,0.95)]";
        } else {
          chip.className += " border border-white/20 bg-white/10 text-white/90 hover:bg-white/20";
        }
        chip.textContent = city;
        chip.addEventListener("click", () => selectCity(city));
        suggestedCities.appendChild(chip);
      });
    }

    function renderCityOptions(query) {
      const keyword = normalizeCity(query);
      const filtered = allCities.filter((city) => normalizeCity(city).includes(keyword));

      cityOptionsList.innerHTML = "";
      cityNoResults.classList.toggle("hidden", filtered.length !== 0);

      filtered.forEach((city) => {
        const isSelected = city === selectedCity;
        const option = document.createElement("button");
        option.type = "button";
        option.dataset.city = city;
        option.className = "rounded-xl border px-4 py-3 text-left text-sm font-semibold transition-all active:scale-[0.98]";
        if (isSelected) {
          option.className += " border-[#FF8A5B] bg-gradient-to-r from-[#FF4D6D] to-[#FF8A5B] text-white shadow-[0_10px_20px_-14px_rgba(255,77,109,0.9)]";
        } else {
          option.className += " border-white/15 bg-white/5 text-white hover:bg-white/10";
        }
        option.textContent = city;
        option.addEventListener("click", () => selectCity(city));
        cityOptionsList.appendChild(option);
      });
    }

    function setFeed(feed) {
      activeFeed = feed;
      renderFeed(feed);
      renderSuggestedCities();
      renderCityOptions(citySearchInput.value || "");
    }

    function openCitySheet() {
      cityBackdrop.classList.remove("hidden");
      citySheet.classList.remove("hidden");
      citySearchInput.value = "";
      renderSuggestedCities();
      renderCityOptions("");
      citySearchInput.focus();
    }

    function closeCitySheet() {
      cityBackdrop.classList.add("hidden");
      citySheet.classList.add("hidden");
    }

    typeButtons.forEach((button) => {
      button.addEventListener("click", () => setFeed(button.dataset.feed));
    });

    openCityPicker.addEventListener("click", openCitySheet);
    closeCityPicker.addEventListener("click", closeCitySheet);
    cityBackdrop.addEventListener("click", closeCitySheet);
    citySearchInput.addEventListener("input", () => {
      renderCityOptions(citySearchInput.value);
    });
    citySearchInput.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeCitySheet();
    });

    setFeed(activeFeed);
  })();
</script>
